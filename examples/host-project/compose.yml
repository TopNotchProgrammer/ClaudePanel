# Drop into a host project's repo root. Requires:
#   ./           — the project files claude can browse (mounted to /app)
#   ./claude/    — claude state + OAuth credentials (mounted to /home/node/.claude)
#   ./claude.json — claude CLI settings
#
# After `docker compose up -d`, panel is at http://localhost:8080.
# Run ./start.sh to also attach a terminal to the tmux session.

services:
  claude-panel:
    image: topnotchprogrammer/claude-panel:latest
    container_name: claude-panel
    pull_policy: always
    working_dir: /app/claude-panel
    volumes:
      - .:/app
      - ./claude:/home/node/.claude
      - ./claude.json:/home/node/.claude.json
      - /var/run/docker.sock:/var/run/docker.sock
      - ./claude-panel:/srv
    environment:
      CLAUDE_DIR: /home/node/.claude
      PORT: "8080"
      TMUX_SOCKET: /tmp/cpa-tmux/default
      TMUX_TARGET: cpa-tmux
      UPLOADS_DIR: /app/claude-panel/uploads
      UPLOADS_CLAUDE_PATH: /app/claude-panel/uploads
      PANEL_LANG: pl # UI language: "pl" (default) or "en"
    ports:
      - "8080:8080"
    group_add:
      # docker socket gid on the host. `getent group docker | cut -d: -f3` on host.
      - "998"
    stdin_open: true
    tty: true
    restart: unless-stopped
